<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 180" role="img" aria-labelledby="title desc">
  <title id="title">ERP Search logo</title>
  <desc id="desc">ERP Search wordmark with magnifying glass and ERP analytics mark</desc>
  <defs>
    <linearGradient id="navy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#173b72"/>
      <stop offset="100%" stop-color="#102d57"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39c4bb"/>
      <stop offset="100%" stop-color="#1f9f97"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#102d57" flood-opacity="0.14"/>
    </filter>
  </defs>

  <g transform="translate(18 18)" filter="url(#softShadow)">
    <circle cx="74" cy="74" r="58" fill="none" stroke="url(#navy)" stroke-width="11"/>
    <path d="M113 113 145 145" stroke="url(#navy)" stroke-width="16" stroke-linecap="round"/>
    <path d="M145 145 157 133" stroke="url(#navy)" stroke-width="16" stroke-linecap="round"/>
    <path d="M48 98V63c0-4 3-7 7-7h15c4 0 7 3 7 7v35z" fill="url(#teal)"/>
    <path d="M79 98V48c0-4 3-7 7-7h15c4 0 7 3 7 7v50z" fill="url(#teal)"/>
    <path d="M31 91 54 68 80 68 101 45 122 45" fill="none" stroke="url(#teal)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="54" cy="68" r="5" fill="#ffffff"/>
    <circle cx="80" cy="68" r="5" fill="#ffffff"/>
    <circle cx="101" cy="45" r="5" fill="#ffffff"/>
    <circle cx="122" cy="45" r="5" fill="#ffffff"/>
  </g>

  <text x="198" y="102" font-size="92" font-weight="700" fill="#153769" font-family="IBM Plex Sans, Arial, sans-serif">erpsearch</text>
  <text x="655" y="126" font-size="42" font-weight="700" fill="#153769" font-family="IBM Plex Sans, Arial, sans-serif">.com.au</text>
  <text x="198" y="154" font-size="28" font-weight="500" fill="#284a78" font-family="IBM Plex Sans, Arial, sans-serif">Your one-stop hub for ERP decisions</text>
</svg>
